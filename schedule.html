<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<title>江门畅跑选班查询</title>
<style>
*{-webkit-box-sizing:border-box;box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Helvetica Neue','Microsoft YaHei',Arial,sans-serif;background:#f0f4f8;min-height:100vh;-webkit-text-size-adjust:100%;}
#login-page{display:-webkit-box;display:-webkit-flex;display:flex;-webkit-box-align:center;-webkit-align-items:center;align-items:center;-webkit-box-pack:center;-webkit-justify-content:center;justify-content:center;min-height:100vh;padding:20px;}
.login-card{background:#fff;border-radius:16px;padding:36px 28px;width:100%;max-width:340px;-webkit-box-shadow:0 4px 24px rgba(0,0,0,.10);box-shadow:0 4px 24px rgba(0,0,0,.10);}
.login-logo{text-align:center;margin-bottom:24px;}
.login-logo .icon{font-size:44px;display:block;}
.login-logo h1{font-size:20px;font-weight:700;color:#1a1a2e;margin-top:8px;}
.login-logo p{font-size:13px;color:#6b7280;margin-top:4px;}
.form-label{display:block;font-size:13px;color:#374151;margin-bottom:6px;font-weight:500;}
.form-input{width:100%;padding:14px;border:2px solid #e5e7eb;border-radius:10px;font-size:32px;text-align:center;letter-spacing:16px;font-weight:700;outline:none;-webkit-appearance:none;appearance:none;}
.btn-login{width:100%;padding:14px;background:#2563eb;color:#fff;border:none;border-radius:10px;font-size:16px;font-weight:600;margin-top:12px;-webkit-appearance:none;appearance:none;cursor:pointer;}
.login-error{color:#dc2626;font-size:13px;text-align:center;margin-top:10px;display:none;}
#main-page{display:none;}
.topbar{background:#2563eb;color:#fff;padding:12px 16px;display:-webkit-box;display:-webkit-flex;display:flex;-webkit-box-align:center;-webkit-align-items:center;align-items:center;-webkit-box-pack:justify;-webkit-justify-content:space-between;justify-content:space-between;position:-webkit-sticky;position:sticky;top:0;z-index:10;}
.topbar-title{font-size:16px;font-weight:700;}
.topbar-sub{font-size:12px;opacity:.85;margin-top:2px;}
.btn-logout{background:rgba(255,255,255,.2);border:none;color:#fff;padding:6px 12px;border-radius:6px;font-size:12px;-webkit-appearance:none;appearance:none;cursor:pointer;}
.content{padding:14px;}
.squad-badge{background:#eff6ff;border:1.5px solid #bfdbfe;border-radius:10px;padding:12px 16px;display:-webkit-box;display:-webkit-flex;display:flex;-webkit-box-align:center;-webkit-align-items:center;align-items:center;gap:10px;margin-bottom:14px;}
.sq-icon{font-size:24px;}
.sq-name{font-size:16px;font-weight:700;color:#1e40af;}
.sq-count{font-size:12px;color:#6b7280;margin-top:2px;}
.date-tabs{display:-webkit-box;display:-webkit-flex;display:flex;gap:8px;margin-bottom:14px;overflow-x:auto;padding-bottom:6px;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
.date-tabs::-webkit-scrollbar{display:none;}
.date-tab{-webkit-flex-shrink:0;flex-shrink:0;padding:8px 10px;border-radius:20px;border:1.5px solid #e5e7eb;background:#fff;font-size:12px;cursor:pointer;color:#374151;text-align:center;min-width:60px;-webkit-appearance:none;appearance:none;}
.date-tab.active{background:#2563eb;color:#fff;border-color:#2563eb;font-weight:600;}
.date-tab .day-name{display:block;font-size:10px;opacity:.8;margin-top:1px;}
.date-tab.today{border-color:#f59e0b;}
.date-tab.today:not(.active){color:#d97706;font-weight:600;}
.shift-bar{display:-webkit-box;display:-webkit-flex;display:flex;-webkit-flex-wrap:wrap;flex-wrap:wrap;gap:6px;margin-bottom:12px;}
.shift-btn{padding:5px 12px;border-radius:20px;border:1.5px solid #e5e7eb;background:#fff;font-size:12px;cursor:pointer;color:#374151;font-weight:500;-webkit-appearance:none;appearance:none;}
.shift-btn.active{font-weight:700;border-width:2px;}
.sb-all.active{background:#2563eb;color:#fff;border-color:#2563eb;}
.sb-early.active{background:#fef9c3;color:#854d0e;border-color:#ca8a04;}
.sb-noon.active{background:#dcfce7;color:#166534;border-color:#16a34a;}
.sb-tea.active{background:#dbeafe;color:#1e40af;border-color:#2563eb;}
.sb-eve.active{background:#f3e8ff;color:#6b21a8;border-color:#9333ea;}
.sb-sup1.active{background:#fce7f3;color:#9d174d;border-color:#db2777;}
.sb-sup2.active{background:#1e293b;color:#e2e8f0;border-color:#475569;}
.summary-bar{background:#f8fafc;border-radius:8px;padding:9px 12px;margin-bottom:12px;font-size:13px;color:#374151;}
.summary-bar strong{color:#2563eb;}
.search-wrap{position:relative;margin-bottom:12px;}
.search-input{width:100%;padding:10px 14px 10px 38px;border:1.5px solid #e5e7eb;border-radius:10px;font-size:14px;outline:none;-webkit-appearance:none;appearance:none;}
.search-icon{position:absolute;left:12px;top:50%;-webkit-transform:translateY(-50%);transform:translateY(-50%);color:#9ca3af;font-size:16px;pointer-events:none;}
.riders-grid{display:block;}
.rider-card{background:#fff;border-radius:12px;padding:12px 14px;border:1.5px solid #f3f4f6;-webkit-box-shadow:0 1px 4px rgba(0,0,0,.05);box-shadow:0 1px 4px rgba(0,0,0,.05);margin-bottom:10px;}

.rider-id{font-size:11px;color:#9ca3af;}
.shift-tag{display:inline-block;padding:3px 9px;border-radius:5px;margin:2px 2px 0 0;font-size:12px;font-weight:500;}
.t-n2{background:#1e293b;color:#e2e8f0;}
.t-zc{background:#fef9c3;color:#854d0e;}
.t-wg{background:#dcfce7;color:#166534;}
.t-xwc{background:#dbeafe;color:#1e40af;}
.t-whf{background:#f3e8ff;color:#6b21a8;}
.t-xy1{background:#fce7f3;color:#9d174d;}

</style>
</head>

<div id="login-page">
  <div class="login-card">
    <div class="login-logo">
      <span class="icon">🏍️</span>
      <h1>江门畅跑选班查询</h1>
      <p>骑士长专用 · 0406周</p>
    </div>
    <label class="form-label">骑士长编号（输入 1、2 或 3）</label>
    <input class="form-input" type="tel" id="input-code" placeholder="1/2/3" maxlength="1" />
    <button class="btn-login" onclick="doLogin()">进入查询</button>
    <div class="login-error" id="login-error">编号不正确，请输入 1、2 或 3</div>
  </div>
</div>

<div id="main-page">
  <div class="topbar">
    <div>
      <div class="topbar-title">江门畅跑选班查询</div>
      <div class="topbar-sub" id="topbar-user"></div>
    </div>
    <button class="btn-logout" onclick="doLogout()">退出</button>
  </div>
  <div class="content">
    <div class="squad-badge">
      <span class="sq-icon">👥</span>
      <div>
        <div class="sq-name" id="squad-name-label"></div>
        <div class="sq-count" id="squad-count-label"></div>
      </div>
    </div>
    <div class="date-tabs" id="date-tabs"></div>
    <div class="shift-bar">
      <button class="shift-btn sb-all active" onclick="setShift('all',this)">全部</button>
      <button class="shift-btn sb-early" onclick="setShift('早餐',this)">早餐</button>
      <button class="shift-btn sb-noon" onclick="setShift('午高峰',this)">午高峰</button>
      <button class="shift-btn sb-tea" onclick="setShift('下午茶',this)">下午茶</button>
      <button class="shift-btn sb-eve" onclick="setShift('晚高峰',this)">晚高峰</button>
      <button class="shift-btn sb-sup1" onclick="setShift('夜宵1',this)">夜宵1</button>
      <button class="shift-btn sb-sup2" onclick="setShift('夜宵2',this)">夜宵2</button>
    </div>
    <div class="summary-bar" id="summary-bar"></div>
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input class="search-input" type="text" id="search-input" placeholder="搜索骑手姓名…" oninput="render()" />
    </div>
    <div id="riders-grid"></div>
  </div>
</div>

var DATE_LABELS = {"20260406": {"label": "04/06", "day": "周日"}, "20260407": {"label": "04/07", "day": "周一"}, "20260408": {"label": "04/08", "day": "周二(今天)"}, "20260409": {"label": "04/09", "day": "周三"}, "20260410": {"label": "04/10", "day": "周四"}, "20260411": {"label": "04/11", "day": "周五"}, "20260412": {"label": "04/12", "day": "周六"}};
var SHIFT_CLASS = {'夜宵2':'t-n2','早餐':'t-zc','午高峰':'t-wg','下午茶':'t-xwc','晚高峰':'t-whf','夜宵1':'t-xy1'};

var currentSquad = null;
var currentDate  = null;
var currentShift = 'all';

function doLogin() {
  var code = document.getElementById('input-code').value.trim();
  var leader = LEADERS[code];
  if (!leader) {
    document.getElementById('login-error').style.display = 'block';
    return;
  }
  currentSquad = leader.squad;
  document.getElementById('login-error').style.display = 'none';
  document.getElementById('topbar-user').innerHTML = leader.name + ' &middot; ' + leader.squad;
  document.getElementById('squad-name-label').innerHTML = leader.squad;
  var members = [];
  for (var i = 0; i < RIDERS.length; i++) { if (RIDERS[i].squad === currentSquad) members.push(RIDERS[i]); }
  document.getElementById('squad-count-label').innerHTML = '共 ' + members.length + ' 名骑手';
  document.getElementById('login-page').style.display = 'none';
  document.getElementById('main-page').style.display = 'block';
  buildDateTabs();
}

function doLogout() {
  document.getElementById('input-code').value = '';
  document.getElementById('main-page').style.display = 'none';
  document.getElementById('login-page').style.display = 'flex';
  currentSquad = null; currentDate = null; currentShift = 'all';
}

function buildDateTabs() {
  var container = document.getElementById('date-tabs');
  container.innerHTML = '';
  var dates = Object.keys(DATE_LABELS).sort();
  var defaultDate = dates[2]; // 20260408 今天
  for (var i = 0; i < dates.length; i++) {
    (function(d) {
      var info = DATE_LABELS[d];
      var isToday = d === '20260408';
      var btn = document.createElement('button');
      btn.className = 'date-tab' + (isToday ? ' today' : '') + (d === defaultDate ? ' active' : '');
      btn.innerHTML = info.label + '<span class="day-name">' + info.day + '</span>';
      btn.onclick = function() {
        var tabs = document.getElementsByClassName('date-tab');
        for (var j = 0; j < tabs.length; j++) tabs[j].classList.remove('active');
        btn.classList.add('active');
        currentDate = d;
        currentShift = 'all';
        var sbBtns = document.getElementsByClassName('shift-btn');
        for (var j = 0; j < sbBtns.length; j++) sbBtns[j].classList.remove('active');
        document.getElementsByClassName('sb-all')[0].classList.add('active');
        render();
      };
      container.appendChild(btn);
    })(dates[i]);
  }
  currentDate = defaultDate;
  render();
}

function setShift(shift, btn) {
  currentShift = shift;
  var btns = document.getElementsByClassName('shift-btn');
  for (var i = 0; i < btns.length; i++) btns[i].classList.remove('active');
  btn.classList.add('active');
  render();
}

function render() {
  var keyword = document.getElementById('search-input').value || '';
  keyword = keyword.trim();
  var grid = document.getElementById('riders-grid');
  var summaryBar = document.getElementById('summary-bar');

  var members = [];
  for (var i = 0; i < RIDERS.length; i++) {
    if (RIDERS[i].squad === currentSquad) members.push(RIDERS[i]);
  }
  if (keyword) {
    var filtered2 = [];
    for (var i = 0; i < members.length; i++) {
      if (members[i].name.indexOf(keyword) >= 0) filtered2.push(members[i]);
    }
    members = filtered2;
  }

  var processed = [];
  for (var i = 0; i < members.length; i++) {
    var r = members[i];
    var raw = r.schedule[currentDate] || '';
    var offDuty = !raw;
    var shifts = [];
    if (raw) {
      var parts = raw.split('|');
      for (var j = 0; j < parts.length; j++) {
        var m = parts[j].match(/^([^\[]+)\[([^\]]+)\]$/);
        if (m) shifts.push({name: m[1], time: m[2]});
        else shifts.push({name: parts[j], time: ''});
      }
    }
    processed.push({id:r.id, name:r.name, squad:r.squad, shifts:shifts, offDuty:offDuty});
  }

  if (currentShift !== 'all') {
    var f = [];
    for (var i = 0; i < processed.length; i++) {
      var hasShift = false;
      for (var j = 0; j < processed[i].shifts.length; j++) {
        if (processed[i].shifts[j].name === currentShift) { hasShift = true; break; }
      }
      if (hasShift) f.push(processed[i]);
    }
    processed = f;
  }

  processed.sort(function(a, b) {
    if (a.offDuty && !b.offDuty) return 1;
    if (!a.offDuty && b.offDuty) return -1;
    return 0;
  });

  var total = processed.length;
  var withShift = 0;
  for (var i = 0; i < processed.length; i++) { if (!processed[i].offDuty) withShift++; }
  summaryBar.innerHTML = '共 <strong>' + total + '</strong> 人' +
    (currentShift === 'all' ? '，有排班 <strong>' + withShift + '</strong> 人' : '，排 <strong>' + currentShift + '</strong> 班 <strong>' + withShift + '</strong> 人');

  if (!processed.length) {
    grid.innerHTML = '<div class="no-result">没有找到骑手 🔍</div>';
    return;
  }

  var html = '';
  for (var i = 0; i < processed.length; i++) {
    var r = processed[i];
    var shiftHtml = '';
    if (r.offDuty) {
      shiftHtml = '<span class="shift-tag t-off">未排班</span>';
    } else {
      for (var j = 0; j < r.shifts.length; j++) {
        var s = r.shifts[j];
        var cls = SHIFT_CLASS[s.name] || 't-off';
        shiftHtml += '<span class="shift-tag ' + cls + '">' + s.name + ' ' + s.time + '</span>';
      }
    }
    html += '<div class="rider-card">' +
      '<div class="rider-header">' +
        '<span class="rider-name">' + r.name + '</span>' +
        '<span class="rider-id">ID: ' + r.id + '</span>' +
      '</div>' +
      '<div>' + shiftHtml + '</div>' +
    '</div>';
  }
  grid.innerHTML = html;
}

document.getElementById('input-code').onkeydown = function(e) {
  if (e.keyCode === 13) doLogin();
};
</script>
