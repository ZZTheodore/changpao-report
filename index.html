<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>近4周排班吻合率 · 骑士长面谈看板</title>
<style>
:root {
    --blue: #4472C4; --green: #548235; --orange: #ED7D31;
    --bg: #f0f2f5; --card: #ffffff; --text: #2c3e50;
    --good: #27ae60; --warn: #f39c12; --bad: #e74c3c;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','PingFang SC','Hiragino Sans GB',sans-serif;
       background:var(--bg); color:var(--text); min-height:100vh; }

/* Header */
.header { background:linear-gradient(135deg,#1a1a2e 0%,#16213e 50%,#0f3460 100%);
           padding:24px; color:white; position:sticky; top:0; z-index:100;
           box-shadow:0 4px 20px rgba(0,0,0,0.15); }
.header-inner { max-width:1200px; margin:0 auto; display:flex; justify-content:space-between; align-items:center; }
.header h1 { font-size:20px; font-weight:600; }
.header .subtitle { font-size:12px; opacity:0.7; margin-top:2px; }
.header .stats { display:flex; gap:24px; }
.header .stat { text-align:center; }
.header .stat-val { font-size:22px; font-weight:700; }
.header .stat-label { font-size:10px; opacity:0.6; }

/* Tab Navigation */
.tabs { max-width:1200px; margin:16px auto 0; display:flex; gap:4px; padding:0 16px; }
.tab { padding:10px 20px; border-radius:8px 8px 0 0; cursor:pointer; font-size:13px; font-weight:500;
        background:#e0e0e0; color:#666; transition:all .2s; }
.tab.active { background:var(--card); color:var(--text); box-shadow:0 -2px 8px rgba(0,0,0,0.05); }
.tab[data-tab="combined"] { border-top:3px solid var(--blue); }
.tab[data-tab="lepao"] { border-top:3px solid #2E75B6; }
.tab[data-tab="changpao"] { border-top:3px solid var(--green); }

/* Main Content */
.content { max-width:1200px; margin:0 auto; padding:0 16px 24px; }
.panel { display:none; }
.panel.active { display:block; }

/* Team selector for 1-on-1 */
.team-nav { background:var(--card); border-radius:0 12px 12px 12px; padding:16px; margin-bottom:16px;
             box-shadow:0 2px 12px rgba(0,0,0,0.06); }
.team-nav-title { font-size:13px; color:#888; margin-bottom:8px; }
.team-chips { display:flex; flex-wrap:wrap; gap:6px; }
.chip { padding:6px 12px; border-radius:20px; font-size:12px; cursor:pointer;
         border:1px solid #ddd; transition:all .15s; }
.chip:hover { border-color:var(--blue); background:#f0f4ff; }
.chip.active { background:var(--blue); color:white; border-color:var(--blue); }
.chip.green { border-color:var(--good); }
.chip.yellow { border-color:var(--warn); }
.chip.red { border-color:var(--bad); }

/* Detail Card (1-on-1 view) */
.detail-card { background:var(--card); border-radius:12px; padding:24px; margin-bottom:16px;
                box-shadow:0 2px 12px rgba(0,0,0,0.06); }
.detail-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; }
.detail-team { font-size:22px; font-weight:700; }
.detail-leader { font-size:13px; color:#888; }
.detail-badge { padding:6px 14px; border-radius:20px; font-size:14px; font-weight:600; color:white; }
.detail-badge.green { background:var(--good); }
.detail-badge.yellow { background:var(--warn); }
.detail-badge.red { background:var(--bad); }

.metrics-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:16px; margin-bottom:20px; }
.metric-box { background:#f8f9fc; border-radius:10px; padding:16px; text-align:center; }
.metric-box .label { font-size:11px; color:#888; }
.metric-box .val { font-size:28px; font-weight:700; margin:4px 0; }
.metric-box .sub { font-size:11px; color:#aaa; }

.week-breakdown { margin-top:16px; }
.week-breakdown h3 { font-size:14px; margin-bottom:12px; color:#555; }
.week-bars { display:grid; grid-template-columns:repeat(4,1fr); gap:8px; }
.week-bar { text-align:center; }
.week-bar .bar-label { font-size:10px; color:#888; margin-bottom:4px; }
.week-bar .bar-container { height:100px; background:#f0f0f0; border-radius:6px; position:relative;
                            display:flex; align-items:flex-end; justify-content:center; overflow:hidden; }
.week-bar .bar-fill { width:100%; border-radius:6px; transition:height .3s; }
.week-bar .bar-value { position:absolute; top:4px; font-size:12px; font-weight:700; }

/* Rankings table */
.rank-table { width:100%; border-collapse:separate; border-spacing:0; }
.rank-table th { background:#f8f9fc; padding:10px 8px; font-size:11px; color:#888;
                  text-align:center; font-weight:500; position:sticky; top:0; }
.rank-table td { padding:10px 8px; text-align:center; border-bottom:1px solid #f0f0f0; font-size:12px; }
.rank-table tr:hover td { background:#f8f9ff; }
.rank-table .rank-num { font-weight:700; font-size:14px; }
.rank-table .team-name { text-align:left; font-weight:500; cursor:pointer; color:var(--blue); }
.rank-table .team-name:hover { text-decoration:underline; }
.rate-cell { padding:4px 6px; border-radius:4px; font-weight:500; }
.rate-cell.green { background:#e8f5e9; color:#2e7d32; }
.rate-cell.yellow { background:#fff8e1; color:#f57f17; }
.rate-cell.red { background:#fce4ec; color:#c62828; }
.arrow { font-size:14px; margin-left:2px; }
.arrow.up { color:var(--good); }
.arrow.down { color:var(--bad); }
.arrow.flat { color:#999; }

/* Canvas for chart */
.chart-container { margin-top:16px; position:relative; height:200px; }
canvas { width:100%!important; }

/* Mobile */
@media (max-width:768px) {
    .header-inner { flex-direction:column; gap:12px; }
    .metrics-grid { grid-template-columns:1fr; }
    .week-bars { grid-template-columns:repeat(2,1fr); }
    .tabs { overflow-x:auto; }
}
</style>
</head>

        changpao: ['cp_r','cp_avg','cp_c','cp_ca']
    };
    const [rk,ak,ck,cak] = keyMap[panelId];
    const rates = r[rk], avg = r[ak], counts = r[ck], cavg = r[cak];
    const leader = leaders[teamName] || '';
    
    // Rank
    const sorted = [...rows].sort((a,b)=>b[ak]-a[ak]);
    const rank = sorted.findIndex(x=>x.lp_team===teamName)+1;
    
    const det = document.getElementById('detail-'+panelId);
    det.style.display = 'block';
    det.scrollIntoView({behavior:'smooth', block:'start'});
    
    let h = `<div class="detail-header">
        <div><div class="detail-team">${teamName}</div>
        <div class="detail-leader">${leader?'骑士长：'+leader:''} · 排名 ${rank}/20</div></div>
        <div class="detail-badge ${colorCls(avg)}">${avg}%</div></div>`;
    
    h += `<div class="metrics-grid">
        <div class="metric-box"><div class="label">综合吻合率</div><div class="val" style="color:${colorHex(r.comb_avg)}">${r.comb_avg}%</div><div class="sub">乐跑+畅跑合计</div></div>
        <div class="metric-box"><div class="label">乐跑吻合率</div><div class="val" style="color:${colorHex(r.lp_avg)}">${r.lp_avg}%</div><div class="sub">${r.lp_ca}人/周</div></div>
        <div class="metric-box"><div class="label">畅跑吻合率</div><div class="val" style="color:${colorHex(r.cp_avg)}">${r.cp_avg}%</div><div class="sub">${r.cp_ca}人/周</div></div>
    </div>`;
    
    // Week bars
    h += `<div class="week-breakdown"><h3>📈 4周走势</h3><div class="week-bars">`;
    rates.forEach((v,i) => {
        const barH = Math.max((v-60)/40*100, 5);
        h += `<div class="week-bar">
            <div class="bar-label">${weeks[i]}</div>
            <div class="bar-container">
                <div class="bar-fill" style="height:${barH}%;background:${colorHex(v)}"></div>
                <div class="bar-value" style="color:${colorHex(v)}">${v}%</div>
            </div>
            <div style="font-size:10px;color:#888;margin-top:4px">${counts[i]}人</div>
        </div>`;
    });
    h += `</div></div>`;
    
    // Performance summary
    const best = Math.max(...rates), worst = Math.min(...rates);
    const improving = rates[3] > rates[0];
    h += `<div style="margin-top:16px;padding:12px;background:#f8f9fc;border-radius:8px;font-size:12px;color:#555">
        <b>📝 面谈要点：</b><br>
        · 最高单周：${best}%（${weeks[rates.indexOf(best)]}）<br>
        · 最低单周：${worst}%（${weeks[rates.indexOf(worst)]}）<br>
        · 波动幅度：${(best-worst).toFixed(1)}个百分点<br>
        · 整体趋势：${improving?'📈 上升':'📉 下降'}（首周${rates[0]}% → 末周${rates[3]}%）<br>
        · 全市平均：${panelId==='combined'?grand.comb_avg:panelId==='lepao'?grand.lp_avg:grand.cp_avg}%，该队${avg>=( panelId==='combined'?grand.comb_avg:panelId==='lepao'?grand.lp_avg:grand.cp_avg)?'<span style="color:#27ae60">高于</span>':'<span style="color:#e74c3c">低于</span>'}平均
    </div>`;
    
    det.innerHTML = h;
}

function switchTab(tab) {
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
    document.querySelector(`.tab[data-tab="${tab}"]`).classList.add('active');
    document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
    document.getElementById('panel-'+tab).classList.add('active');
}

// Init
buildPanel('combined','comb_r','comb_avg','comb_c','comb_ca','#4472C4');
buildPanel('lepao','lp_r','lp_avg','lp_c','lp_ca','#2E75B6');
buildPanel('changpao','cp_r','cp_avg','cp_c','cp_ca','#548235');
</script>
