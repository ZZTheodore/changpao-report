<style>
:root { --blue:#4472C4; --green:#548235; --orange:#ED7D31; --bg:#f0f2f5; --card:#fff; --text:#2c3e50;
        --good:#27ae60; --warn:#f39c12; --bad:#e74c3c; }
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','PingFang SC',sans-serif;
       background:var(--bg); color:var(--text); min-height:100vh; }
.header { background:linear-gradient(135deg,#1a1a2e,#16213e,#0f3460); padding:20px 24px; color:white;
           position:sticky; top:0; z-index:100; box-shadow:0 4px 20px rgba(0,0,0,.15); }
.header-inner { max-width:1200px; margin:0 auto; display:flex; justify-content:space-between; align-items:center; }
.header h1 { font-size:18px; font-weight:600; }
.header .subtitle { font-size:11px; opacity:.7; margin-top:2px; }
.header .stats { display:flex; gap:20px; }
.header .stat-val { font-size:20px; font-weight:700; }
.header .stat-label { font-size:10px; opacity:.6; }
.tabs { max-width:1200px; margin:12px auto 0; display:flex; gap:4px; padding:0 16px; }
.tab { padding:10px 20px; border-radius:8px 8px 0 0; cursor:pointer; font-size:13px; font-weight:500;
       background:#e0e0e0; color:#666; transition:all .2s; user-select:none; }
.tab.active { background:var(--card); color:var(--text); box-shadow:0 -2px 8px rgba(0,0,0,.05); }
.tab[data-tab="combined"] { border-top:3px solid var(--blue); }
.tab[data-tab="lepao"] { border-top:3px solid #2E75B6; }
.tab[data-tab="changpao"] { border-top:3px solid var(--green); }
.content { max-width:1200px; margin:0 auto; padding:0 16px 24px; }
.panel { display:none; } .panel.active { display:block; }
.team-nav { background:var(--card); border-radius:0 12px 12px 12px; padding:16px; margin-bottom:16px;
            box-shadow:0 2px 12px rgba(0,0,0,.06); }
.team-nav-title { font-size:13px; color:#888; margin-bottom:8px; }
.team-chips { display:flex; flex-wrap:wrap; gap:6px; }
.chip { padding:6px 12px; border-radius:20px; font-size:12px; cursor:pointer;
        border:1px solid #ddd; transition:all .15s; user-select:none; }
.chip:hover { border-color:var(--blue); background:#f0f4ff; }
.chip.active { background:var(--blue); color:white; border-color:var(--blue); }
.detail-card { background:var(--card); border-radius:12px; padding:24px; margin-bottom:16px;
               box-shadow:0 2px 12px rgba(0,0,0,.06); }

.detail-team { font-size:22px; font-weight:700; }
.detail-leader { font-size:13px; color:#888; }
.detail-badge { padding:6px 14px; border-radius:20px; font-size:14px; font-weight:600; color:white; }
.detail-badge.green { background:var(--good); } .detail-badge.yellow { background:var(--warn); } .detail-badge.red { background:var(--bad); }
.metrics-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:16px; margin-bottom:20px; }
.metric-box { background:#f8f9fc; border-radius:10px; padding:16px; text-align:center; }
.metric-box .label { font-size:11px; color:#888; }
.metric-box .val { font-size:28px; font-weight:700; margin:4px 0; }
.metric-box .sub { font-size:11px; color:#aaa; }
.chart-section { margin-top:20px; }
.chart-section h3 { font-size:14px; margin-bottom:12px; color:#555; }
.chart-row { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
.chart-box { background:#f8f9fc; border-radius:10px; padding:16px; }
.chart-box .chart-title { font-size:12px; color:#888; margin-bottom:8px; text-align:center; }
.chart-canvas { position:relative; height:140px; }
.talk-points { margin-top:20px; padding:16px; background:linear-gradient(135deg,#f8f9fc,#eef1f7);

.talk-points h4 { font-size:13px; margin-bottom:10px; color:#333; }
.talk-points .section-title { font-weight:600; color:#444; margin-top:10px; font-size:12px; }
.talk-points ul { padding-left:16px; margin:4px 0 8px; }
.talk-points li { font-size:12px; color:#555; line-height:1.9; }
.talk-points .summary { margin-top:12px; padding:12px; background:white; border-radius:8px;

.rank-table { width:100%; border-collapse:separate; border-spacing:0; }
.rank-table th { background:#f8f9fc; padding:10px 6px; font-size:11px; color:#888; text-align:center; font-weight:500; }
.rank-table td { padding:8px 6px; text-align:center; border-bottom:1px solid #f0f0f0; font-size:12px; }
.rank-table tr:hover td { background:#f8f9ff; }
.rank-table .rank-num { font-weight:700; font-size:14px; }
.rank-table .team-name { text-align:left; font-weight:500; cursor:pointer; color:var(--blue); }
.rank-table .team-name:hover { text-decoration:underline; }
.rate-cell { padding:3px 6px; border-radius:4px; font-weight:500; display:inline-block; min-width:38px; }
.rate-cell.green { background:#e8f5e9; color:#2e7d32; }

.arrow { font-size:14px; margin-left:2px; }

@media (max-width:768px) {

function colorCls(v){return v>=95?'green':v>=90?'yellow':'red';}
function colorHex(v){return v>=95?'#27ae60':v>=90?'#f39c12':'#e74c3c';}
function trendArrow(rates){
    if(rates.length<2)return '';
    let d=rates[rates.length-1]-rates[rates.length-2];
    return d>1?'<span class="arrow up">↑</span>':d<-1?'<span class="arrow down">↓</span>':'<span class="arrow flat">→</span>';
}

function makeSVG(values, color, w, h, isRate){
    if(!values||values.every(v=>v===0))return '';
    let mn=Math.min(...values),mx=Math.max(...values);
    if(isRate){mn=Math.max(mn-5,50);mx=Math.min(mx+5,100);}
    else{mn=Math.max(mn*0.7,0);mx=mx*1.2;}
    let rng=mx-mn||1;
    let padX=30,padY=22,cw=w-padX*2,ch=h-padY*2;
    let pts=values.map((v,i)=>[padX+i/(values.length-1)*cw, padY+(1-(v-mn)/rng)*ch]);
    let polyline=pts.map(p=>p[0].toFixed(1)+','+p[1].toFixed(1)).join(' ');
    let svg=`<svg viewBox="0 0 ${w} ${h}" style="width:100%;height:100%">`;
    svg+=`<line x1="${padX}" y1="${h-padY}" x2="${w-padX}" y2="${h-padY}" stroke="#eee" stroke-width="0.5"/>`;
    let area=`${pts[0][0]},${h-padY} ${polyline} ${pts[pts.length-1][0]},${h-padY}`;
    svg+=`<polygon points="${area}" fill="${color}" opacity="0.1"/>`;
    svg+=`<polyline points="${polyline}" fill="none" stroke="${color}" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>`;
    pts.forEach((p,i)=>{
        svg+=`<circle cx="${p[0]}" cy="${p[1]}" r="4" fill="white" stroke="${color}" stroke-width="2"/>`;
        let lbl=isRate?values[i].toFixed(1)+'%':Math.round(values[i])+'人';
        svg+=`<text x="${p[0]}" y="${p[1]-10}" text-anchor="middle" font-size="10" fill="${color}" font-weight="600">${lbl}</text>`;
    });
    pts.forEach((p,i)=>{
        let wk=weeks[i].split('-')[0];
        svg+=`<text x="${p[0]}" y="${h-4}" text-anchor="middle" font-size="9" fill="#999">${wk}</text>`;
    });
    svg+=`</svg>`;
    return svg;
}

    });
    html+=`</div></div><div id="detail-${panelId}" class="detail-card" style="display:none"></div>`;
    html+=`<div class="detail-card"><h3 style="margin-bottom:12px;font-size:15px">📋 全队排名</h3>
    <div style="overflow-x:auto"><table class="rank-table"><thead><tr>
    <th>名次</th><th style="text-align:left">小队</th><th>骑士长</th>`;
    weeks.forEach(w=>{html+=`<th>${w}</th>`;});
    html+=`<th>4周平均</th><th>趋势</th><th>人数</th></tr></thead><tbody>`;
    sorted.forEach((r,i)=>{
        let rates=r[rateKey];
        html+=`<tr><td class="rank-num">${i+1}</td>
        <td class="team-name" onclick="showDetail('${panelId}','${r.lp_team}')">${r.lp_team}</td>
        <td style="font-size:11px;color:#555">${leaders[r.lp_team]||'-'}</td>`;
        rates.forEach(v=>{html+=`<td><span class="rate-cell ${colorCls(v)}">${v}</span></td>`;});
        html+=`<td><span class="rate-cell ${colorCls(r[avgKey])}" style="font-weight:700">${r[avgKey]}</span></td>
        <td>${trendArrow(rates)}</td><td style="color:#666">${Math.round(r[cavgKey])}</td></tr>`;
    });
    html+=`</tbody></table></div></div>`;
    panel.innerHTML=html;
}

function showDetail(panelId,teamName){
    const r=rows.find(x=>x.lp_team===teamName);
    if(!r)return;
    const sorted=[...rows].sort((a,b)=>b.comb_avg-a.comb_avg);
    const rank=sorted.findIndex(x=>x.lp_team===teamName)+1;
    const leader=leaders[teamName]||'';
    const det=document.getElementById('detail-'+panelId);
    det.style.display='block';
    det.scrollIntoView({behavior:'smooth',block:'start'});
    
    let h=`<div class="detail-header"><div>
        <div class="detail-team">${teamName}</div>
        <div class="detail-leader">${leader&&leader!='(空缺)'?'骑士长：'+leader+' · ':''}综合排名 ${rank}/20</div>
    </div><div class="detail-badge ${colorCls(r.comb_avg)}">${r.comb_avg}%</div></div>`;
    
    h+=`<div class="metrics-grid">
        <div class="metric-box"><div class="label">综合吻合率</div><div class="val" style="color:${colorHex(r.comb_avg)}">${r.comb_avg}%</div>
            <div class="sub">${Math.round(r.comb_ca)}人/周</div></div>
        <div class="metric-box"><div class="label">乐跑吻合率</div><div class="val" style="color:${colorHex(r.lp_avg)}">${r.lp_avg}%</div>
            <div class="sub">${Math.round(r.lp_ca)}人/周</div></div>
        <div class="metric-box"><div class="label">畅跑吻合率</div><div class="val" style="color:${colorHex(r.cp_avg)}">${r.cp_avg}%</div>
            <div class="sub">${Math.round(r.cp_ca)}人/周</div></div>
    </div>`;
    
    // 4 charts: 乐跑吻合率 / 畅跑吻合率 / 乐跑人数 / 畅跑人数
    h+=`<div class="chart-section"><h3>📈 4周趋势对比</h3><div class="chart-row">
        <div class="chart-box"><div class="chart-title">🔵 乐跑吻合率走势</div>
            <div class="chart-canvas">${makeSVG(r.lp_r,'#2E75B6',320,130,true)}</div></div>
        <div class="chart-box"><div class="chart-title">🟢 畅跑吻合率走势</div>
            <div class="chart-canvas">${makeSVG(r.cp_r,'#548235',320,130,true)}</div></div>
    </div><div class="chart-row" style="margin-top:12px">
        <div class="chart-box"><div class="chart-title">🔵 乐跑人数变化</div>
            <div class="chart-canvas">${makeSVG(r.lp_c,'#2E75B6',320,130,false)}</div></div>
        <div class="chart-box"><div class="chart-title">🟢 畅跑人数变化</div>
            <div class="chart-canvas">${makeSVG(r.cp_c,'#548235',320,130,false)}</div></div>
    </div></div>`;
    
    // 面谈要点 - 分乐跑/畅跑 + 综合总结
    let lpTrend=r.lp_r[3]-r.lp_r[0], cpTrend=r.cp_r[3]-r.cp_r[0];
    let lpBest=Math.max(...r.lp_r),lpWorst=Math.min(...r.lp_r);
    let cpBest=Math.max(...r.cp_r),cpWorst=Math.min(...r.cp_r);
    let lpCntTrend=r.lp_c[3]-r.lp_c[0], cpCntTrend=r.cp_c[3]-r.cp_c[0];
    
    h+=`<div class="talk-points"><h4>📝 面谈要点</h4>`;
    
    // 乐跑
    h+=`<div class="section-title">🔵 乐跑表现</div><ul>
        <li><b>吻合率：</b>${r.lp_avg}%（全市${grand.lp_avg}%），${r.lp_avg>=grand.lp_avg?'<span style="color:#27ae60;font-weight:600">高于全市'+Math.abs(r.lp_avg-grand.lp_avg).toFixed(1)+'pp</span>':'<span style="color:#e74c3c;font-weight:600">低于全市'+Math.abs(r.lp_avg-grand.lp_avg).toFixed(1)+'pp</span>'}</li>
        <li><b>趋势：</b>${lpTrend>1?'📈 上升中（+'+lpTrend.toFixed(1)+'pp）':lpTrend<-1?'📉 下滑中（'+lpTrend.toFixed(1)+'pp）':'➡️ 走势平稳'}，波动幅度${(lpBest-lpWorst).toFixed(1)}pp（${lpWorst}%~${lpBest}%）</li>
        <li><b>人数：</b>${Math.round(r.lp_ca)}人/周，${lpCntTrend>0?'较首周增加'+lpCntTrend+'人':lpCntTrend<0?'较首周减少'+Math.abs(lpCntTrend)+'人':'人数稳定'}</li></ul>`;
    
    // 畅跑
    h+=`<div class="section-title">🟢 畅跑表现</div><ul>
        <li><b>吻合率：</b>${r.cp_avg}%（全市${grand.cp_avg}%），${r.cp_avg>=grand.cp_avg?'<span style="color:#27ae60;font-weight:600">高于全市'+Math.abs(r.cp_avg-grand.cp_avg).toFixed(1)+'pp</span>':'<span style="color:#e74c3c;font-weight:600">低于全市'+Math.abs(r.cp_avg-grand.cp_avg).toFixed(1)+'pp</span>'}</li>
        <li><b>趋势：</b>${cpTrend>1?'📈 上升中（+'+cpTrend.toFixed(1)+'pp）':cpTrend<-1?'📉 下滑中（'+cpTrend.toFixed(1)+'pp）':'➡️ 走势平稳'}，波动幅度${(cpBest-cpWorst).toFixed(1)}pp（${cpWorst}%~${cpBest}%）</li>
        <li><b>人数：</b>${Math.round(r.cp_ca)}人/周，${cpCntTrend>0?'较首周增加'+cpCntTrend+'人':cpCntTrend<0?'较首周减少'+Math.abs(cpCntTrend)+'人':'人数稳定'}</li></ul>`;
    
    // 综合总结
    let combTrend=r.comb_r[3]-r.comb_r[0];
    let issue='';
    if(r.lp_avg<grand.lp_avg&&r.cp_avg<grand.cp_avg) issue='⚠️ 乐跑和畅跑均低于全市平均，需重点关注两线出勤管理';
    else if(r.cp_avg<grand.cp_avg&&r.lp_avg>=grand.lp_avg) issue='💡 乐跑达标但畅跑偏低，建议重点改善畅跑骑手的排班出勤';
    else if(r.lp_avg<grand.lp_avg&&r.cp_avg>=grand.cp_avg) issue='💡 畅跑达标但乐跑偏低，建议关注乐跑骑手排班执行情况';
    else issue='✅ 两线均超全市平均，继续保持！';
    
    let scaleNote='';
    let totalPeople=Math.round(r.comb_ca);
    if(totalPeople>50) scaleNote='大队（'+totalPeople+'人），管理难度较高';
    else if(totalPeople>30) scaleNote='中等规模（'+totalPeople+'人）';
    else scaleNote='小队（'+totalPeople+'人），管理相对容易';
    
    h+=`<div class="summary">
        <b>📊 综合评估</b><br><br>
        <b>吻合率维度：</b>综合 <b>${r.comb_avg}%</b>（全市${grand.comb_avg}%），${r.comb_avg>=grand.comb_avg?'高于':'低于'}全市${Math.abs(r.comb_avg-grand.comb_avg).toFixed(1)}pp；趋势${combTrend>1?'上升':''}${combTrend<-1?'下降':''}${Math.abs(combTrend)<=1?'平稳':''}（${r.comb_r[0]}% → ${r.comb_r[3]}%）<br>
        <b>人数维度：</b>${scaleNote}，乐跑${Math.round(r.lp_ca)}+畅跑${Math.round(r.cp_ca)}，${Math.abs(r.comb_c[3]-r.comb_c[0])<=2?'规模稳定':r.comb_c[3]>r.comb_c[0]?'队伍在扩张':'队伍有流失'}<br><br>
        <b>关键结论：</b>${issue}
    </div></div>`;
    
    det.innerHTML=h;
}

function switchTab(tab){
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
    document.querySelector(`.tab[data-tab="${tab}"]`).classList.add('active');
    document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
    document.getElementById('panel-'+tab).classList.add('active');
}
buildPanel('combined','comb_r','comb_avg','comb_c','comb_ca','#4472C4');
buildPanel('lepao','lp_r','lp_avg','lp_c','lp_ca','#2E75B6');
buildPanel('changpao','cp_r','cp_avg','cp_c','cp_ca','#548235');
</script>
</body></html>
